name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: baptiste0928/cargo-install@v3
        with:
          crate: wasm-pack

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache RISC-V toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ~/.cache/rvemu-web/riscv-toolchain
          key: riscv-toolchain-2026.03.28

      - name: Download RISC-V toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: bash scripts/download-toolchain.sh

      - name: Build test programs
        run: bash scripts/build-test-programs.sh

      - name: Generate test programs manifest
        run: node scripts/generate-manifest.js

      - name: Build wasm package
        run: npm run wasm:build

      - name: Build web app
        env:
          GITHUB_ACTIONS: true
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
